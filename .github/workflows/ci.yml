name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint Python
        run: ruff check .

      - name: Compile Python
        run: python -m py_compile whatweb_scan.py ffuf_fuzzer.py subdomains_onprem_cloud.py nmap_batch_html_excel.py

  bash-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: shellcheck -S error dns_info_check.sh recon_web.sh nmap_scan.sh
